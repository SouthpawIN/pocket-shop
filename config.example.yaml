# Pocket Shop Configuration Example
# Copy this to config.yaml and fill in your values

financial:
  restock_target: 500.00    # Dollar amount to trigger set purchase
  ev_threshold: 10.0        # Minimum EV percentage to consider

gmail:
  email: "your-email@gmail.com"
  app_password: "YOUR_16_CHAR_APP_PASSWORD"  # From Google App Passwords

ebay:
  mode: browser             # 'browser' (default) or 'api'
  # If using API mode, add these:
  # developer_id: "YOUR_DEVELOPER_ID"
  # cert_id: "YOUR_CERTIFICATE_ID"
  # app_id: "YOUR_RU_NAME"
  # refresh_token: "YOUR_REFRESH_TOKEN"

tcgplayer:
  api_key: "YOUR_API_KEY"   # Optional - browser mode works without this
